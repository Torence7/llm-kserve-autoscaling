policy_key: keda-vllm-composite
policy_type: keda-composite

min_replicas: 1
max_replicas: 5
polling_interval: 15
cooldown_period: 60

triggers:
  - name: requests_waiting
    metric_name: vllm_requests_waiting
    query: |
      sum(vllm:num_requests_waiting{namespace="llm-demo"})
    threshold: "2"
    activation_threshold: "1"

  - name: kv_cache_pressure
    metric_name: vllm_kv_cache_usage
    query: |
      avg(vllm:kv_cache_usage_perc{namespace="llm-demo"}) * 100
    threshold: "70"
    activation_threshold: "50"

advanced:
  scaling_modifiers:
    formula: "max(requests_waiting, kv_cache_pressure)"
    target: "1"
    activation_target: "1"
