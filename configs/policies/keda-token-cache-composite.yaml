policy_key: keda-token-cache-composite
policy_type: keda-composite

min_replicas: 1
max_replicas: 6
polling_interval: 5
cooldown_period: 60

prometheus:
  server_address: http://prometheus-kube-prometheus-prometheus.monitoring.svc.cluster.local:9090
  timeout: "10s"
  ignore_null_values: "false"

advanced:
  scaling_modifiers:
    formula: "(token_pressure * 1.0) + (kv_cache_pct * 1.5)"
    target: "6"
    activation_target: "1"

triggers:
  - name: token_pressure
    metric_name: vllm_token_pressure
    query: |
      (
        0.25 *
        sum(
          vllm:num_requests_running{namespace="llm-demo"}
        )
      )
      +
      (
        2.0 *
        sum(
          vllm:num_requests_waiting{namespace="llm-demo"}
        )
      )
      +
      (
        0.10 *
        sum(
          rate(vllm:prompt_tokens_total{namespace="llm-demo"}[1m])
        )
      )
      +
      (
        0.05 *
        sum(
          rate(vllm:generation_tokens_total{namespace="llm-demo"}[1m])
        )
      )
    threshold: "6"
    activation_threshold: "1"

  - name: kv_cache_pct
    metric_name: vllm_kv_cache_usage_percent
    query: |
      avg(
        vllm:kv_cache_usage_perc{namespace="llm-demo"}
      )
    threshold: "1.0"
    activation_threshold: "0.5"