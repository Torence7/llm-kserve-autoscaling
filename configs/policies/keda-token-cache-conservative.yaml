policy_key: keda-token-cache-conservative
policy_type: keda-composite

min_replicas: 1
max_replicas: 5
polling_interval: 5
cooldown_period: 60

prometheus:
  server_address: http://prometheus-kube-prometheus-prometheus.monitoring.svc.cluster.local:9090

advanced:
  scaling_modifiers:
    formula: "(token_workload * 1.0) + (kv_cache_pct * 2.0)"
    target: "12"
    activation_target: "3"

triggers:
  - name: token_workload
    metric_name: vllm_token_workload
    query: |
      (
        sum(
          rate(vllm:prompt_tokens_total{namespace="llm-demo"}[1m])
        )
      )
      +
      0.5 *
      (
        sum(
          rate(vllm:generation_tokens_total{namespace="llm-demo"}[1m])
        )
      )
    threshold: "12"
    activation_threshold: "4"

  - name: kv_cache_pct
    metric_name: vllm_kv_cache_usage_percent
    query: |
      avg(
        vllm:kv_cache_usage_perc{namespace="llm-demo"}
      )
    threshold: "0.10"
    activation_threshold: "0.05"
