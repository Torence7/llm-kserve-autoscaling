name: queue-pressure
description: Queue-forming workload that still allows replica startup effects to be observed.
request_type: completions
duration_seconds: 240

dataset:
  mode: synthetic

prompt:
  style: repeated_context
  seed_text: "Queue-aware autoscaling for LLM serving must account for prompt prefill, decode throughput, and backpressure under bursty demand. "
  min_tokens: 256
  max_tokens: 512

output:
  max_tokens_min: 48
  max_tokens_max: 96

phases:
  - name: warmup
    duration_seconds: 30
    arrival_pattern: constant
    rps: 0.10

  - name: queue_build
    duration_seconds: 90
    arrival_pattern: constant
    rps: 0.35

  - name: pressure_peak
    duration_seconds: 60
    arrival_pattern: constant
    rps: 0.55

  - name: recovery
    duration_seconds: 60
    arrival_pattern: constant
    rps: 0.15

slo:
  ttft_p95_ms: 15000
  e2e_p95_ms: 120000