name: queue-pressure
description: Moderately stressed queue-forming workload to separate autoscaling policies without collapsing the system.
request_type: completions
duration_seconds: 240

dataset:
  mode: synthetic

prompt:
  style: repeated_context
  seed_text: "Queue-aware autoscaling for LLM serving must account for prompt prefill, decode throughput, and backpressure under bursty demand. "
  min_tokens: 128
  max_tokens: 256

output:
  max_tokens_min: 32
  max_tokens_max: 64

phases:
  - name: warmup
    duration_seconds: 30
    arrival_pattern: constant
    rps: 0.05

  - name: queue_build
    duration_seconds: 90
    arrival_pattern: constant
    rps: 0.30

  - name: pressure_peak
    duration_seconds: 60
    arrival_pattern: constant
    rps: 0.45

  - name: recovery
    duration_seconds: 60
    arrival_pattern: constant
    rps: 0.10

slo:
  ttft_p95_ms: 15000
  e2e_p95_ms: 120000
