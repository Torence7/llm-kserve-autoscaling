name: short-bursts
description: Short-burst scenario sized for policy comparison
request_type: completions
arrival_pattern: poisson
duration_seconds: 120
mean_rps: 1.5
warmup_seconds: 0
cooldown_seconds: 0

dataset:
  mode: synthetic

prompt:
  style: plain
  template: "Explain autoscaling in one or two short sentences."
  min_tokens: 8
  max_tokens: 24

output:
  max_tokens: 24

slo:
  ttft_p95_ms: 4000
  e2e_p95_ms: 8000
