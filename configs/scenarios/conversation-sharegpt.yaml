name: conversation-sharegpt
description: Real-user conversational prompts derived from ShareGPT-style traces
request_type: completions
arrival_pattern: poisson
duration_seconds: 120
mean_rps: 1.0
warmup_seconds: 0
cooldown_seconds: 0

dataset:
  mode: jsonl
  path: configs/data/sharegpt_prompts_5k.jsonl
  source: sharegpt-style

prompt:
  style: dataset_prompt
  min_tokens: 16
  max_tokens: 256

output:
  max_tokens: 96

slo:
  ttft_p95_ms: 5000
  e2e_p95_ms: 10000